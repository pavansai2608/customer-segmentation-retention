name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt dvc

      - name: Configure DVC remote credentials
        if: ${{ secrets.DAGSHUB_TOKEN != '' }}
        run: |
          dvc remote modify origin --local auth basic
          dvc remote modify origin --local user "${{ secrets.DAGSHUB_USER }}"
          dvc remote modify origin --local password "${{ secrets.DAGSHUB_TOKEN }}"

      - name: Pull model artifacts from DagsHub
        run: |
          dvc pull || echo "::warning::DVC pull failed or was skipped — add DAGSHUB_USER/DAGSHUB_TOKEN repo secrets so backend tests can load real models."

      - name: Run pytest
        working-directory: backend
        run: pytest -v

  frontend:
    name: Frontend tests & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/my-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/my-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --watchAll=false
        env:
          CI: true

      - name: Build production bundle
        run: npm run build
        env:
          REACT_APP_API_URL: http://localhost:8000